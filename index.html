<!DOCTYPE html>
<html lang="de" data-theme="krl-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>printEdit – Datentechnik Reitz</title>
<style>
/* ── KUKA-Theme ───────── */
:root,[data-theme=krl-dark]{
  --bg1:#1E1E1E; --bg2:#252526; --bg3:#2D2D2D; --bg4:#37373D;
  --bg-hover:#3C3C3C; --bg-input:#1E1E1E;
  --border:#454545; --border2:#3C3C3C;
  --text1:#CCCCCC; --text2:#999999; --text3:#666666; --text-on:#FFFFFF;
  --accent:#007ACC;
  --scrollbar-track:#1E1E1E; --scrollbar-thumb:#424242; --scrollbar-thumb-hover:#555555;
  --sim-bg:#141414;
}
[data-theme=krl-light]{
  --bg1:#FFFFFF; --bg2:#F3F3F3; --bg3:#EBEBEB; --bg4:#C8DCFF;
  --bg-hover:#DCDCDC; --bg-input:#FFFFFF;
  --border:#C0C0C0; --border2:#D8D8D8;
  --text1:#1E1E1E; --text2:#555555; --text3:#888888; --text-on:#000000;
  --accent:#007ACC;
  --scrollbar-track:#F0F0F0; --scrollbar-thumb:#BBBBBB; --scrollbar-thumb-hover:#999999;
  --sim-bg:#E8E8E8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg1);color:var(--text1)}
.hdr{height:35px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;}
.hdr-logo{color:var(--accent);font-weight:700;font-size:.85em;letter-spacing:1px;font-family:monospace;padding:0 6px}
.hdr-brand{color:var(--text3);font-size:.72em;margin-right:4px}
.hdr-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
.hdr-btn{background:transparent;border:1px solid transparent;color:var(--text2);border-radius:3px;padding:0 10px;cursor:pointer;font-size:.78em;font-family:inherit;height:24px;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;}
.hdr-btn:hover{background:var(--bg-hover);color:var(--text1);border-color:var(--border)}
.hdr-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.hdr-btn.primary:hover{opacity:.85}
.hdr-btn.active{color:var(--accent);border-color:var(--accent)}
.hdr-btn.active:hover{background:var(--bg-hover)}
.hdr-spacer{flex:1}
#hdr-filename{color:var(--text3);font-size:.74em;font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status{height:22px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:14px;font-size:.72em;color:var(--text3);font-family:monospace;flex-shrink:0;overflow:hidden;}
.status .v{color:var(--text2)}
.status .va{color:var(--accent)}
#s-msg{color:#4ec9b0;margin-left:auto;white-space:nowrap}
.main{display:flex;height:calc(100vh - 57px);overflow:hidden}
.editor-panel{flex:1;min-width:0;display:flex;flex-direction:column;min-width:200px}
#editor-wrap{flex:1;min-height:0}
.rsz{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0}
.rsz:hover,.rsz.active{background:var(--accent)}
.right-panel{flex:1;min-width:260px;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.sim-bar{height:35px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 6px;gap:3px;flex-shrink:0;}
.sim-lbl{color:var(--text3);font-size:.7em;font-family:monospace;letter-spacing:.5px;flex-shrink:0;padding:0 2px}
.s-btn{background:transparent;border:1px solid transparent;color:var(--text2);border-radius:3px;padding:0 6px;cursor:pointer;font-size:.78em;font-family:monospace;height:22px;display:flex;align-items:center;flex-shrink:0;}
.s-btn:hover{background:var(--bg-hover);color:var(--text1)}
.s-btn.active{color:var(--accent);border-color:var(--accent)}
.s-btn.play{color:var(--accent);border-color:var(--accent);font-size:.9em}
.s-btn.play.running{background:var(--accent);color:#fff}
.layer-disp{color:var(--accent);font-family:monospace;font-size:.8em;min-width:66px;text-align:center;flex-shrink:0}
.slider-row{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0;}
#layer-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:14px}
.layer-z{color:var(--text3);font-family:monospace;font-size:.7em;min-width:76px;text-align:right;flex-shrink:0}
/* color mode row */
.cmode-row{height:26px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;font-family:monospace;font-size:.68em;color:var(--text3);}
.cm-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:3px;padding:0 7px;cursor:pointer;font-size:.75em;font-family:monospace;height:18px;display:flex;align-items:center;flex-shrink:0;white-space:nowrap;}
.cm-btn:hover{color:var(--text1);border-color:var(--accent)}
.cm-btn.active{color:var(--accent);border-color:var(--accent);background:var(--bg4)}
.sim-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--sim-bg)}
#sim-canvas{display:block}
/* legend */
#sim-legend{position:absolute;bottom:6px;left:8px;font-family:monospace;font-size:.66em;color:var(--text2);pointer-events:none;line-height:2;background:rgba(0,0,0,.35);padding:4px 8px;border-radius:4px}
#sim-legend span{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
.sim-overlay{position:absolute;top:6px;right:8px;font-family:monospace;font-size:.7em;color:var(--text3);pointer-events:none;line-height:1.8;text-align:right}
.sim-loading{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,.5);color:var(--accent);font-family:monospace;font-size:.82em;z-index:10}
.sim-loading.on{display:flex}
.opt-panel{border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;padding:7px}
.opt-title{color:var(--text3);font-size:.68em;font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.opt-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);border-radius:3px;padding:5px 6px;cursor:pointer;font-size:.72em;font-family:inherit;text-align:left;line-height:1.4;}
.opt-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}
.drop-ov{display:none;position:fixed;inset:0;background:rgba(0,122,204,.08);border:2px dashed var(--accent);z-index:999;align-items:center;justify-content:center;font-size:1.2em;color:var(--accent);font-family:monospace;pointer-events:none}
.drop-ov.on{display:flex}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-logo">printEdit</span>
  <span class="hdr-brand">Datentechnik Reitz</span>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="loadFile()">&#128194; Laden</button>
  <button class="hdr-btn" onclick="saveFile()">&#128190; Speichern</button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="toggleTravel()" id="btn-travel">Travel: aus</button>
  <button class="hdr-btn" onclick="toggleTheme()" id="btn-theme">&#9728; Hell</button>
  <div class="hdr-spacer"></div>
  <span id="hdr-filename">Keine Datei</span>
</div>

<div class="status">
  <span>Zeilen: <span class="v" id="s-lines">&#8211;</span></span>
  <span>Layer: <span class="va" id="s-layers">&#8211;</span></span>
  <span>Zeit: <span class="v" id="s-time">&#8211;</span></span>
  <span>Filament: <span class="v" id="s-fil">&#8211;</span></span>
  <span>Cursor: <span class="v" id="s-cur">1:1</span></span>
  <span id="s-msg"></span>
</div>

<div class="main">
  <div class="editor-panel">
    <div id="editor-wrap"></div>
  </div>
  <div class="rsz" id="rsz"></div>
  <div class="right-panel" id="right-panel">
    <div class="sim-bar">
      <button class="s-btn play" id="btn-play" onclick="playAnim()" title="Abspielen">&#9654;</button>
      <button class="s-btn" id="btn-stop" onclick="stopAnim()" title="Stop">&#9632;</button>
      <div style="width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0"></div>
      <span class="sim-lbl">LAYER</span>
      <button class="s-btn" onclick="layerFirst()">|&#9668;</button>
      <button class="s-btn" onclick="layerStep(-10)">&#171;</button>
      <button class="s-btn" onclick="layerStep(-1)">&#8249;</button>
      <span class="layer-disp" id="layer-disp">&#8211; / &#8211;</span>
      <button class="s-btn" onclick="layerStep(1)">&#8250;</button>
      <button class="s-btn" onclick="layerStep(10)">&#187;</button>
      <button class="s-btn" onclick="layerLast()">&#9658;|</button>
      <button class="s-btn active" id="btn-cumul" onclick="toggleCumul()">CUM</button>
      <div style="flex:1"></div>
      <span class="sim-lbl">Geschw.</span>
      <input type="range" id="speed-slider" min="1" max="100" value="50"
             style="width:60px;accent-color:var(--accent);cursor:pointer;height:14px;flex-shrink:0"
             oninput="document.getElementById('speed-val').textContent=this.value">
      <span id="speed-val" style="color:var(--accent);font-family:monospace;font-size:.72em;min-width:24px;text-align:right;flex-shrink:0">50</span>
    </div>
    <div class="slider-row">
      <span class="sim-lbl">Z</span>
      <input type="range" id="layer-slider" min="1" max="100" value="100" oninput="sliderInput(this.value)">
      <span class="layer-z" id="layer-z-val">&#8211;</span>
    </div>
    <!-- Color mode selector -->
    <div class="cmode-row">
      <span style="margin-right:4px">Farbe:</span>
      <button class="cm-btn active" id="cm-type"    onclick="setColorMode('type')">Typ</button>
      <button class="cm-btn"        id="cm-speed"   onclick="setColorMode('speed')">Geschw.</button>
      <button class="cm-btn"        id="cm-layer"   onclick="setColorMode('layer')">Layer</button>
      <button class="cm-btn"        id="cm-overhang" onclick="setColorMode('overhang')">Overhang</button>
    </div>
    <div class="sim-wrap" id="sim-wrap">
      <canvas id="sim-canvas"></canvas>
      <div id="sim-legend"></div>
      <div class="sim-overlay" id="sim-overlay"></div>
      <div class="sim-loading" id="sim-loading">Simuliere&#8230;</div>
    </div>
    <div class="opt-panel">
      <div class="opt-title">Optimierungen</div>
      <div class="opt-grid">
        <button class="opt-btn" onclick="optDuplicates()">&#9889; Duplikate<br>entfernen</button>
        <button class="opt-btn" onclick="optComments()">&#9986; Kommentare<br>l&ouml;schen</button>
        <button class="opt-btn" onclick="optEmptyLines()">&#9723; Leerzeilen<br>l&ouml;schen</button>
        <button class="opt-btn" onclick="optFeed()">&#8644; Vorschub<br>normieren</button>
        <button class="opt-btn" onclick="optStartGcode()">&#8593; Start-<br>G-code</button>
        <button class="opt-btn" onclick="optEndGcode()">&#8595; End-<br>G-code</button>
      </div>
    </div>
  </div>
</div>

<div class="drop-ov" id="drop-ov">G-code hier ablegen</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════
var THEME = localStorage.getItem('pe_theme') || 'krl-dark';

function applyTheme(t) {
  THEME = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('pe_theme', t);
  var btn = document.getElementById('btn-theme');
  btn.textContent = t === 'krl-dark' ? '\u2600 Hell' : '\uD83C\uDF19 Dunkel';
  if (window.ED) monaco.editor.setTheme(t === 'krl-dark' ? 'pe-dark' : 'pe-light');
  if (SIM.renderer) {
    var bg = t === 'krl-dark' ? 0x141414 : 0xE8E8E8;
    SIM.renderer.setClearColor(bg, 1);
    simRender();
  }
}
function toggleTheme() { applyTheme(THEME === 'krl-dark' ? 'krl-light' : 'krl-dark'); }
document.documentElement.setAttribute('data-theme', THEME);

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var CURLAYER    = 0;
var MAXLAYER    = 0;
var CUMULATIVE  = true;
var SHOW_TRAVEL = false;
var PLAYING     = false;
var PLAY_TIMER  = null;
var PLAY_RAF    = null;
var COLOR_MODE  = 'type';   // type | speed | layer | overhang

// ═══════════════════════════════════════════════════════════
//  COLOR PALETTES
// ═══════════════════════════════════════════════════════════
var TYPE_COLORS = {
  perimeter: 0xFFFF00,   // gelb  – Außenwand
  outer_wall: 0xFFFF00,
  wall_outer: 0xFFFF00,
  inner_wall: 0xFF8800,  // orange – Innenwand
  infill:     0x00AAFF,  // blau
  top_solid:  0x00FF88,  // grün – Top/Bottom solid
  bottom_solid:0x00FF88,
  skin:       0x00FF88,
  support:    0xCC44CC,  // lila
  travel:     0x334466,  // dunkelblau
  bridge:     0x00FFFF,  // cyan
  overhang:   0xFF2222,  // rot
  unknown:    0xCCCCCC,
};
var TYPE_LABELS = {
  perimeter:  'Perimeter',
  outer_wall: 'Außenwand',
  wall_outer: 'Außenwand',
  inner_wall: 'Innenwand',
  infill:     'Infill',
  top_solid:  'Top Solid',
  bottom_solid:'Bottom Solid',
  skin:       'Skin',
  support:    'Support',
  travel:     'Travel',
  bridge:     'Bridge',
  overhang:   'Overhang',
  unknown:    'Sonstige',
};

// Regenbogen-Farbverlauf für Speed/Layer (HSL)
function hsvToHex(h,s,v) {
  var r,g,b;
  var i=Math.floor(h*6), f=h*6-i, p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return ((Math.round(r*255)<<16)|(Math.round(g*255)<<8)|Math.round(b*255));
}
function speedColor(f, fmin, fmax) {
  // blau (langsam) → grün → gelb → rot (schnell)
  if (fmax <= fmin) return 0x00AAFF;
  var t = (f - fmin) / (fmax - fmin);
  t = Math.max(0, Math.min(1, t));
  return hsvToHex((1-t)*0.66, 1, 1);
}
function layerColor(li, total) {
  var t = total > 1 ? li / (total-1) : 0;
  return hsvToHex((1-t)*0.66, 1, 1);
}

// ═══════════════════════════════════════════════════════════
//  G-CODE PARSER
// ═══════════════════════════════════════════════════════════
// Segment-Typen werden aus Cura/Prusa/Bambu Kommentaren erkannt
var PARSED = null; // { layers, segments, fmin, fmax }

var TYPE_COMMENT_MAP = [
  [/TYPE:WALL-OUTER/i,          'outer_wall'],
  [/TYPE:WALL-INNER/i,          'inner_wall'],
  [/TYPE:SKIN/i,                'skin'],
  [/TYPE:TOP[-_]?SURFACE/i,     'top_solid'],
  [/TYPE:BOTTOM[-_]?SURFACE/i,  'bottom_solid'],
  [/TYPE:FILL/i,                'infill'],
  [/TYPE:INFILL/i,              'infill'],
  [/TYPE:SUPPORT/i,             'support'],
  [/TYPE:BRIDGE/i,              'bridge'],
  [/TYPE:OVERHANG[-_]?WALL/i,   'overhang'],
  // PrusaSlicer / SuperSlicer
  [/;[^;]*perimeter/i,          'perimeter'],
  [/;[^;]*external\s+perimeter/i,'outer_wall'],
  [/;[^;]*infill/i,             'infill'],
  [/;[^;]*solid\s+infill/i,     'top_solid'],
  [/;[^;]*support/i,            'support'],
  [/;[^;]*bridge/i,             'bridge'],
  [/;[^;]*overhang/i,           'overhang'],
  // Bambu / Orca
  [/FEATURE: Outer wall/i,      'outer_wall'],
  [/FEATURE: Inner wall/i,      'inner_wall'],
  [/FEATURE: Sparse infill/i,   'infill'],
  [/FEATURE: Internal solid/i,  'top_solid'],
  [/FEATURE: Top surface/i,     'top_solid'],
  [/FEATURE: Bottom surface/i,  'bottom_solid'],
  [/FEATURE: Support/i,         'support'],
  [/FEATURE: Bridge/i,          'bridge'],
  [/FEATURE: Overhang/i,        'overhang'],
];

function parseGcode(text) {
  var lines = text.split('\n');
  var layers = [];       // [{z, lineIdx, segStart}]
  var segs   = [];       // [{x0,y0,z0,x1,y1,z1,f,e,type,layer,lineIdx}]

  var cx=0,cy=0,cz=0,ce=0,cf=1500;
  var segType = 'unknown';
  var layerZ  = null;
  var layerIdx= -1;
  var relative= false;
  var fmin=1e9, fmax=0;

  for (var i=0; i<lines.length; i++) {
    var raw  = lines[i];
    var line = raw.trim();
    if (!line) continue;

    // Kommentar-basierte Typ-Erkennung
    var commentIdx = line.indexOf(';');
    if (commentIdx >= 0) {
      var comment = line.slice(commentIdx);
      for (var k=0; k<TYPE_COMMENT_MAP.length; k++) {
        if (TYPE_COMMENT_MAP[k][0].test(comment)) {
          segType = TYPE_COMMENT_MAP[k][1];
          break;
        }
      }
    }

    var cmd = line.split(';')[0].trim().toUpperCase();
    if (!cmd) continue;

    // Relative / absolute
    if (cmd === 'G91') { relative = true;  continue; }
    if (cmd === 'G90') { relative = false; continue; }
    if (/^G92\b/.test(cmd)) {
      var em = cmd.match(/E(-?[\d.]+)/); if (em) ce = parseFloat(em[1]);
      continue;
    }

    if (/^G[01]\b|^G0[01]\b/.test(cmd)) {
      var isG0 = /^G0\b|^G00\b/.test(cmd);
      var mx = cmd.match(/X(-?[\d.]+)/);
      var my = cmd.match(/Y(-?[\d.]+)/);
      var mz = cmd.match(/Z(-?[\d.]+)/);
      var me = cmd.match(/E(-?[\d.]+)/);
      var mf = cmd.match(/F(-?[\d.]+)/);
      if (mf) cf = parseFloat(mf[1]);

      var nx = mx ? (relative ? cx+parseFloat(mx[1]) : parseFloat(mx[1])) : cx;
      var ny = my ? (relative ? cy+parseFloat(my[1]) : parseFloat(my[1])) : cy;
      var nz = mz ? (relative ? cz+parseFloat(mz[1]) : parseFloat(mz[1])) : cz;
      var ne = me ? (relative ? ce+parseFloat(me[1]) : parseFloat(me[1])) : ce;

      var extruding = (!isG0) && me && (ne > ce);
      var moving    = (nx!==cx||ny!==cy||nz!==cz);

      // Neuer Layer bei Z-Anstieg mit Extrusion danach oder explizitem Z
      if (mz && nz !== cz) {
        if (nz > cz) {
          layerZ = nz;
          layerIdx++;
          layers.push({ z: nz, lineIdx: i, segStart: segs.length });
        }
        cz = nz;
      }

      if (moving && (extruding || isG0)) {
        var t = isG0 ? 'travel' : segType;
        // Overhang-Erkennung: G1 bei niedrigem Z-Faktor (kein Z-Wechsel, kurze Segmente)
        var sType = t;
        segs.push({
          x0:cx, y0:cy, z0:cz,
          x1:nx, y1:ny, z1:nz,
          f: cf, e: extruding ? (ne-ce) : 0,
          type: sType,
          layer: layerIdx,
          lineIdx: i
        });
        if (!isG0 && extruding) {
          if (cf < fmin) fmin = cf;
          if (cf > fmax) fmax = cf;
        }
      }

      cx=nx; cy=ny; ce=ne;
    }
  }

  // Nachträgliche Overhang-Erkennung: Extrusions-Segmente deutlich unter mittlerer Layerhöhe
  if (layers.length > 2) {
    var layerHeights = [];
    for (var li=1; li<layers.length; li++) layerHeights.push(layers[li].z - layers[li-1].z);
    var avgLH = layerHeights.reduce(function(a,b){return a+b;},0) / layerHeights.length;
    // Segmente mit signifikantem Z-Abfall sind Bridge/Overhang
    for (var si=0; si<segs.length; si++) {
      var s = segs[si];
      if (s.type==='travel') continue;
      var dz = s.z1 - s.z0;
      if (dz < -avgLH * 0.3) s.type = 'overhang';
    }
  }

  if (fmin > fmax) { fmin=0; fmax=3000; }

  return { layers: layers, segs: segs, fmin: fmin, fmax: fmax };
}

// ═══════════════════════════════════════════════════════════
//  THREE.JS SIMULATOR
// ═══════════════════════════════════════════════════════════
var SIM = {
  renderer: null, scene: null, camera: null, controls: null,
  meshGroup: null, animFrame: null, dirty: false
};

var EXT_WIDTH  = 0.45;  // mm Extrusionsbreite
var EXT_HEIGHT = 0.2;   // mm Schichthöhe (wird aus Layerdaten berechnet)

function simInit() {
  var canvas = document.getElementById('sim-canvas');
  var wrap   = document.getElementById('sim-wrap');
  var W = wrap.offsetWidth, H = wrap.offsetHeight;
  canvas.width  = W; canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';

  if (SIM.renderer) { SIM.renderer.dispose(); }

  SIM.renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
  SIM.renderer.setPixelRatio(window.devicePixelRatio || 1);
  SIM.renderer.setSize(W, H);
  SIM.renderer.setClearColor(THEME === 'krl-dark' ? 0x141414 : 0xE8E8E8, 1);

  SIM.scene = new THREE.Scene();

  // Kamera
  SIM.camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 5000);
  SIM.camera.position.set(0, -200, 200);
  SIM.camera.up.set(0, 0, 1);

  // OrbitControls
  SIM.controls = new THREE.OrbitControls(SIM.camera, canvas);
  SIM.controls.enableDamping = true;
  SIM.controls.dampingFactor = 0.1;
  SIM.controls.target.set(110, 110, 0);
  SIM.controls.update();

  // Druckbett – dünnes Gitter
  var gridHelper = new THREE.GridHelper(220, 22, 0x333333, 0x282828);
  gridHelper.rotation.x = Math.PI / 2;
  gridHelper.position.set(110, 110, 0);
  SIM.scene.add(gridHelper);

  // Render-Loop
  if (SIM.animFrame) cancelAnimationFrame(SIM.animFrame);
  function loop() {
    SIM.animFrame = requestAnimationFrame(loop);
    SIM.controls.update();
    SIM.renderer.render(SIM.scene, SIM.camera);
  }
  loop();

  // Resize
  if (SIM._ro) SIM._ro.disconnect();
  SIM._ro = new ResizeObserver(function() { simResize(); });
  SIM._ro.observe(wrap);

  // Key zoom
  document.removeEventListener('keydown', simKey);
  document.addEventListener('keydown', simKey);
}

function simKey(e) {
  if (!SIM.camera) return;
  var f;
  if (e.key==='+' || e.key==='=' || e.key==='NumpadAdd') f=0.85;
  else if (e.key==='-' || e.key==='NumpadSubtract') f=1.18;
  else return;
  e.preventDefault();
  var cam=SIM.camera, tgt=SIM.controls.target;
  cam.position.sub(tgt).multiplyScalar(f).add(tgt);
  SIM.controls.update();
}

function simResize() {
  var wrap = document.getElementById('sim-wrap');
  var W = wrap.offsetWidth, H = wrap.offsetHeight;
  if (!W||!H||!SIM.renderer) return;
  SIM.renderer.setSize(W, H);
  SIM.camera.aspect = W/H;
  SIM.camera.updateProjectionMatrix();
}

function simRender() {
  if (SIM.renderer && SIM.scene && SIM.camera)
    SIM.renderer.render(SIM.scene, SIM.camera);
}

// ─────────────────────────────────────────────────────────
//  Geometrie aufbauen
// ─────────────────────────────────────────────────────────
// Baut einen flachen Quader (Extrusions-Segment) wie Bambu:
// Breite = EXT_WIDTH, Höhe = EXT_HEIGHT, Länge = Segmentlänge
// Als BufferGeometry für Performance (kein Mesh pro Segment)

function buildSimGeometry(parsed, upToLayer, cumulative) {
  if (!parsed || !parsed.segs.length) return;

  // Schichthöhe aus Daten berechnen
  if (parsed.layers.length > 1) {
    var diffs = [];
    for (var i=1; i<Math.min(10,parsed.layers.length); i++)
      diffs.push(parsed.layers[i].z - parsed.layers[i-1].z);
    EXT_HEIGHT = diffs.reduce(function(a,b){return a+b;})/diffs.length;
    EXT_WIDTH  = EXT_HEIGHT * 2.0; // typisch Breite = 2× Höhe
  }

  // Gruppen pro Typ/Farbe: Map color → {positions[], normals[], indices[]}
  var buckets = {};
  function getBucket(color) {
    if (!buckets[color]) buckets[color] = { pos:[], norm:[], idx:[], cnt:0 };
    return buckets[color];
  }

  var segs   = parsed.segs;
  var layers = parsed.layers;
  var fmin   = parsed.fmin, fmax = parsed.fmax;

  // Layer-Range bestimmen
  var layerFrom = cumulative ? 0 : (upToLayer - 1);
  var layerTo   = upToLayer;  // 1-based → index < layerTo

  for (var si=0; si<segs.length; si++) {
    var s = segs[si];
    if (s.layer < 0) continue;
    if (s.layer >= layerTo) continue;
    if (s.layer < layerFrom) continue;

    var isTravel = s.type === 'travel';
    if (isTravel && !SHOW_TRAVEL) continue;

    // Farbe je nach Modus
    var color;
    if (COLOR_MODE === 'type') {
      color = TYPE_COLORS[s.type] || TYPE_COLORS.unknown;
    } else if (COLOR_MODE === 'speed') {
      color = isTravel ? 0x334466 : speedColor(s.f, fmin, fmax);
    } else if (COLOR_MODE === 'layer') {
      color = layerColor(s.layer, layers.length);
    } else if (COLOR_MODE === 'overhang') {
      if (s.type === 'overhang') color = 0xFF2222;
      else if (s.type === 'bridge') color = 0x00FFFF;
      else if (s.type === 'travel') color = 0x334466;
      else color = 0xCCCCCC;
    }

    var bk = getBucket(color);
    addSegmentGeometry(bk, s, isTravel);
  }

  // Alten Mesh entfernen
  if (SIM.meshGroup) { SIM.scene.remove(SIM.meshGroup); SIM.meshGroup = null; }
  SIM.meshGroup = new THREE.Group();

  for (var col in buckets) {
    var bk = buckets[col];
    if (!bk.pos.length) continue;
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(bk.pos, 3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(bk.norm, 3));
    geo.setIndex(bk.idx);
    var mat = new THREE.MeshLambertMaterial({ color: parseInt(col), side: THREE.FrontSide });
    SIM.meshGroup.add(new THREE.Mesh(geo, mat));
  }

  // Licht
  SIM.scene.clear();
  var gridHelper = new THREE.GridHelper(220, 22, 0x333333, 0x282828);
  gridHelper.rotation.x = Math.PI / 2;
  gridHelper.position.set(110, 110, 0);
  SIM.scene.add(gridHelper);

  var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(100, -100, 200);
  SIM.scene.add(dirLight);
  var ambLight = new THREE.AmbientLight(0xffffff, 0.4);
  SIM.scene.add(ambLight);

  SIM.scene.add(SIM.meshGroup);
}

// Fügt einen Extrusions-Quader als Faces in den Bucket ein
function addSegmentGeometry(bk, s, isTravel) {
  var dx = s.x1 - s.x0;
  var dy = s.y1 - s.y0;
  var dz = s.z1 - s.z0;
  var len = Math.sqrt(dx*dx + dy*dy + dz*dz);
  if (len < 0.001) return;

  var w = isTravel ? 0.08 : EXT_WIDTH;
  var h = isTravel ? 0.08 : EXT_HEIGHT;

  // Lokales Koordinatensystem: L=Längsachse, R=Querseite, U=oben
  // L = Bewegungsrichtung
  var lx=dx/len, ly=dy/len, lz=dz/len;
  // U = Z-Achse (up), aber orthogonalisieren
  var ux=0,uy=0,uz=1;
  // R = L × U
  var rx = ly*uz - lz*uy;
  var ry = lz*ux - lx*uz;
  var rz = lx*uy - ly*ux;
  var rLen = Math.sqrt(rx*rx+ry*ry+rz*rz);
  if (rLen < 0.001) { rx=1;ry=0;rz=0; } else { rx/=rLen;ry/=rLen;rz/=rLen; }
  // U neu berechnen: U = R × L
  ux = ry*lz - rz*ly;
  uy = rz*lx - rx*lz;
  uz = rx*ly - ry*lx;

  // 8 Ecken des Quaders
  // Basis: s.x0,y0,z0  Spitze: s.x1,y1,z1
  // Quer: ±(w/2)*R, Hoch: 0 bis h*U (Extrusion liegt AUF dem Bett)
  var hw = w * 0.5;
  // Unterseite auf z0/z1, Oberseite um h angehoben
  var verts = [
    // p0-Seite
    [s.x0 - rx*hw, s.y0 - ry*hw, s.z0          ],  // 0 links unten
    [s.x0 + rx*hw, s.y0 + ry*hw, s.z0          ],  // 1 rechts unten
    [s.x0 + rx*hw, s.y0 + ry*hw, s.z0 + h*uz   ],  // 2 rechts oben  ← uz ist näherungsweise 1
    [s.x0 - rx*hw, s.y0 - ry*hw, s.z0 + h*uz   ],  // 3 links oben
    // p1-Seite
    [s.x1 - rx*hw, s.y1 - ry*hw, s.z1          ],  // 4
    [s.x1 + rx*hw, s.y1 + ry*hw, s.z1          ],  // 5
    [s.x1 + rx*hw, s.y1 + ry*hw, s.z1 + h*uz   ],  // 6
    [s.x1 - rx*hw, s.y1 - ry*hw, s.z1 + h*uz   ],  // 7
  ];

  var base = bk.cnt;
  for (var vi=0; vi<8; vi++) {
    bk.pos.push(verts[vi][0], verts[vi][1], verts[vi][2]);
  }

  // Normalen (vereinfacht pro Fläche gleich)
  // Seiten: unten, oben, links, rechts, start, end
  var faces = [
    [0,1,5,4], // unten  normal: -U
    [3,7,6,2], // oben   normal: +U
    [0,3,7,4], // links  normal: -R
    [1,2,6,5], // rechts normal: +R
    [0,1,2,3], // start  normal: -L
    [4,5,6,7], // end    normal: +L
  ];
  var faceNormals = [
    [0,0,-1],[0,0,1],
    [-rx,-ry,-rz],[rx,ry,rz],
    [-lx,-ly,-lz],[lx,ly,lz]
  ];

  for (var fi=0; fi<faces.length; fi++) {
    var f=faces[fi], n=faceNormals[fi];
    var i0=base+f[0], i1=base+f[1], i2=base+f[2], i3=base+f[3];
    bk.idx.push(i0,i1,i2, i0,i2,i3);
    // Normalen für alle 8 Verts werden für jede Fläche überschrieben → einfachste Lösung: flat shading über BufferGeometry
  }
  // Normalen pauschal für alle Verts setzen (flat shading kommt über computeVertexNormals)
  for (var ni=0; ni<8; ni++) bk.norm.push(0,0,1);

  bk.cnt += 8;
}

// ─────────────────────────────────────────────────────────
//  Legende
// ─────────────────────────────────────────────────────────
function updateLegend() {
  var el = document.getElementById('sim-legend');
  if (COLOR_MODE === 'type') {
    // Nur tatsächlich vorhandene Typen zeigen
    if (!PARSED) { el.innerHTML=''; return; }
    var found = {};
    PARSED.segs.forEach(function(s){ found[s.type]=true; });
    var html = '';
    for (var k in TYPE_COLORS) {
      if (!found[k]) continue;
      if (k==='travel' && !SHOW_TRAVEL) continue;
      var c = '#' + ('000000'+TYPE_COLORS[k].toString(16)).slice(-6);
      html += '<div><span style="background:'+c+'"></span>'+(TYPE_LABELS[k]||k)+'</div>';
    }
    el.innerHTML = html;
  } else if (COLOR_MODE === 'speed') {
    el.innerHTML = '<div>Geschwindigkeit</div>'
      +'<div style="background:linear-gradient(to right,#0055ff,#00ff00,#ff0000);width:100px;height:8px;border-radius:2px;display:inline-block"></div>'
      +'<div style="display:flex;justify-content:space-between;width:100px"><span>langsam</span><span>schnell</span></div>';
  } else if (COLOR_MODE === 'layer') {
    el.innerHTML = '<div>Layer</div>'
      +'<div style="background:linear-gradient(to right,#0055ff,#00ff00,#ff0000);width:100px;height:8px;border-radius:2px;display:inline-block"></div>'
      +'<div style="display:flex;justify-content:space-between;width:100px"><span>unten</span><span>oben</span></div>';
  } else if (COLOR_MODE === 'overhang') {
    el.innerHTML = '<div><span style="background:#cccccc"></span>Normal</div>'
      +'<div><span style="background:#00ffff"></span>Bridge</div>'
      +'<div><span style="background:#ff2222"></span>Overhang</div>';
  }
}

// ═══════════════════════════════════════════════════════════
//  SIMULATION starten
// ═══════════════════════════════════════════════════════════
function runSim() {
  if (!window.ED) return;
  stopAnim();
  var text  = ED.getValue();
  var lines = ED.getModel().getLineCount();
  document.getElementById('s-lines').textContent = lines.toLocaleString('de');
  var loading = document.getElementById('sim-loading');
  if (lines > 3000) loading.classList.add('on');

  setTimeout(function() {
    try {
      PARSED = parseGcode(text);
      MAXLAYER = PARSED.layers.length;
      CURLAYER = MAXLAYER;

      var sl = document.getElementById('layer-slider');
      sl.max = MAXLAYER || 1; sl.value = MAXLAYER;

      buildSimGeometry(PARSED, CURLAYER, CUMULATIVE);
      updateLayerView();
      updateStats();
      updateLegend();
      flash('Simulation \u00B7 ' + MAXLAYER + ' Layer');
    } catch(e) { flash('Fehler: ' + e.message); console.error(e); }
    loading.classList.remove('on');
  }, 0);
}

function updateLayerView() {
  if (!PARSED || !MAXLAYER) return;
  document.getElementById('layer-disp').textContent = CURLAYER + ' / ' + MAXLAYER;
  var layer = PARSED.layers[CURLAYER-1];
  var zStr  = layer ? layer.z.toFixed(3) + ' mm' : '\u2013';
  document.getElementById('layer-z-val').textContent = zStr;
  document.getElementById('sim-overlay').textContent = 'Layer ' + CURLAYER + ' / ' + MAXLAYER + '\nZ = ' + zStr;
  buildSimGeometry(PARSED, CURLAYER, CUMULATIVE);
  // Editor-Sync
  if (window.ED && layer) {
    ED.revealLineInCenter(layer.lineIdx + 1);
    ED.setPosition({ lineNumber: layer.lineIdx + 1, column: 1 });
  }
}

function setLayerTo(n) {
  if (!PARSED || !MAXLAYER) return;
  CURLAYER = Math.max(1, Math.min(MAXLAYER, n));
  document.getElementById('layer-slider').value = CURLAYER;
  updateLayerView();
}

function updateStats() {
  if (!PARSED) return;
  document.getElementById('s-layers').textContent = PARSED.layers.length;
  var totalE=0, totalTime=0;
  PARSED.segs.forEach(function(s) {
    var d = Math.sqrt(Math.pow(s.x1-s.x0,2)+Math.pow(s.y1-s.y0,2)+Math.pow(s.z1-s.z0,2));
    if (s.f > 0) totalTime += d / s.f * 60;
    if (s.e > 0) totalE += s.e;
  });
  var mm=Math.floor(totalTime/60), ss=Math.floor(totalTime%60);
  document.getElementById('s-time').textContent = mm+'m '+String(ss).padStart(2,'0')+'s';
  document.getElementById('s-fil').textContent  = totalE.toFixed(1)+' mm';
}

// ═══════════════════════════════════════════════════════════
//  LAYER / PLAY CONTROLS
// ═══════════════════════════════════════════════════════════
function layerStep(d)   { stopAnim(); setLayerTo(CURLAYER + d); }
function layerFirst()   { stopAnim(); setLayerTo(1); }
function layerLast()    { stopAnim(); setLayerTo(MAXLAYER); }
function sliderInput(v) { stopAnim(); setLayerTo(parseInt(v)); }

function playAnim() {
  if (PLAYING || !PARSED || !MAXLAYER) return;
  if (CURLAYER >= MAXLAYER) { CURLAYER=0; document.getElementById('layer-slider').value=0; }
  PLAYING=true;
  document.getElementById('btn-play').classList.add('running');
  playStep();
}
function stopAnim() {
  if (!PLAYING && !PLAY_TIMER && !PLAY_RAF) return;
  PLAYING=false;
  if (PLAY_TIMER) { clearTimeout(PLAY_TIMER); PLAY_TIMER=null; }
  if (PLAY_RAF)   { cancelAnimationFrame(PLAY_RAF); PLAY_RAF=null; }
  var pb=document.getElementById('btn-play'); if (pb) pb.classList.remove('running');
}
function playStep() {
  if (!PLAYING) return;
  if (CURLAYER >= MAXLAYER) { stopAnim(); return; }
  CURLAYER++;
  document.getElementById('layer-slider').value = CURLAYER;
  updateLayerView();
  var speed = parseInt(document.getElementById('speed-slider').value);
  if (speed >= 100) PLAY_RAF = requestAnimationFrame(playStep);
  else { var delay=Math.round((100-speed)*10); PLAY_TIMER=setTimeout(function(){PLAY_TIMER=null;playStep();},delay); }
}

function toggleCumul() {
  CUMULATIVE = !CUMULATIVE;
  document.getElementById('btn-cumul').classList.toggle('active', CUMULATIVE);
  document.getElementById('btn-cumul').textContent = CUMULATIVE ? 'CUM' : 'SGL';
  updateLayerView();
}
function toggleTravel() {
  SHOW_TRAVEL = !SHOW_TRAVEL;
  var b=document.getElementById('btn-travel');
  b.textContent='Travel: '+(SHOW_TRAVEL?'ein':'aus');
  b.classList.toggle('active',SHOW_TRAVEL);
  if (PARSED) { buildSimGeometry(PARSED,CURLAYER,CUMULATIVE); updateLegend(); }
}
function setColorMode(m) {
  COLOR_MODE = m;
  ['type','speed','layer','overhang'].forEach(function(id){
    document.getElementById('cm-'+id).classList.toggle('active', id===m);
  });
  if (PARSED) { buildSimGeometry(PARSED,CURLAYER,CUMULATIVE); updateLegend(); }
}

function loadFile() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.gcode,.g,.nc,.ngc,.txt';
  inp.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){applyFile(ev.target.result,f.name);};r.readAsText(f);};
  inp.click();
}
function saveFile() {
  var blob=new Blob([ED.getValue()],{type:'text/plain'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  var fn=document.getElementById('hdr-filename').textContent;
  a.download=(fn==='Keine Datei'?'output':fn.replace(/\.gcode$/i,''))+'.gcode'; a.click(); flash('Gespeichert: '+a.download);
}
function applyFile(text,name) {
  ED.setValue(text);
  document.getElementById('hdr-filename').textContent=name||'output.gcode';
  runSim();
}
var ov=document.getElementById('drop-ov');
document.addEventListener('dragover',  function(e){e.preventDefault();ov.classList.add('on');});
document.addEventListener('dragleave', function(e){if(!e.relatedTarget)ov.classList.remove('on');});
document.addEventListener('drop', function(e){
  e.preventDefault();ov.classList.remove('on');
  var f=e.dataTransfer.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){applyFile(ev.target.result,f.name);};r.readAsText(f);
});

function getLines()       {return ED.getValue().split('\n');}
function setLines(ll,msg) {ED.setValue(ll.join('\n'));flash(msg||'Fertig');}
function optComments()  {setLines(getLines().map(function(l){return l.split(';')[0].replace(/\([^)]*\)/g,'').trimEnd();}),'Kommentare entfernt');}
function optEmptyLines(){setLines(getLines().filter(function(l){return l.trim()!=='';}), 'Leerzeilen entfernt');}
function optDuplicates(){
  var cx='__',cy='__',cz='__',cf='__', before=getLines().length;
  var out=getLines().filter(function(line){
    var l=line.trim().toUpperCase(),m;
    if(!/^G0\b|^G00\b|^G1\b|^G01\b/.test(l))return true;
    var nx=(m=l.match(/X(-?[\d.]+)/))?m[1]:cx;
    var ny=(m=l.match(/Y(-?[\d.]+)/))?m[1]:cy;
    var nz=(m=l.match(/Z(-?[\d.]+)/))?m[1]:cz;
    var nf=(m=l.match(/F(-?[\d.]+)/))?m[1]:cf;
    var ne=l.match(/E(-?[\d.]+)/);
    if(nx===cx&&ny===cy&&nz===cz&&nf===cf&&!ne)return false;
    cx=nx;cy=ny;cz=nz;cf=nf;return true;
  });
  setLines(out,'Duplikate entfernt \u00B7 '+(before-out.length)+' Zeilen');
}
function optFeed(){
  var f0=prompt('Vorschub G0 (mm/min):','9000'), f1=prompt('Vorschub G1 (mm/min):','1500');
  if(!f0||!f1)return;
  setLines(getLines().map(function(line){
    var l=line.trim().toUpperCase();
    if(/^G0\b|^G00\b/.test(l))return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f0;
    if(/^G1\b|^G01\b/.test(l)&&!line.match(/E/i))return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f1;
    return line;
  }),'Vorschub normiert');
}
function optStartGcode(){
  ED.setValue(['G28        ; Home','G29        ; Bed leveling','G1 Z15 F5000','G92 E0','G1 F140 E30','G92 E0',''].join('\n')+ED.getValue());
  flash('Start-G-code eingef\u00FCgt');
}
function optEndGcode(){
  ED.setValue(ED.getValue()+['\nG91','G1 E-2 F2700','G1 Z10 F3000','G90','G28 X0 Y0','M104 S0','M140 S0','M84'].join('\n'));
  flash('End-G-code eingef\u00FCgt');
}
function flash(msg){
  var el=document.getElementById('s-msg'); el.textContent=msg; clearTimeout(flash._t);
  flash._t=setTimeout(function(){el.textContent='';},3500);
}

require(['vs/editor/editor.main'], function () {

  monaco.editor.defineTheme('pe-light',{base:'vs',inherit:true,rules:[{token:'comment',foreground:'008000',fontStyle:'italic'},{token:'keyword',foreground:'0000FF',fontStyle:'bold'},{token:'number.float',foreground:'098658'},{token:'number',foreground:'098658'},{token:'type',foreground:'267F99'}],colors:{'editor.background':'#FFFFFF','editor.foreground':'#1E1E1E','editor.lineHighlightBackground':'#F0F0F0'}});

  window.ED = monaco.editor.create(document.getElementById('editor-wrap'), {
    language:'gcode', theme: THEME==='krl-dark'?'pe-dark':'pe-light',
    value: SAMPLE_GCODE, fontSize:13, fontFamily:"Consolas,'Courier New',monospace",
    lineNumbers:'on', minimap:{enabled:true,scale:1}, scrollBeyondLastLine:false,
    wordWrap:'off', folding:false, quickSuggestions:false,
    parameterHints:{enabled:false}, suggestOnTriggerCharacters:false, mouseWheelZoom:true,
  });

  var simDebounce;
  ED.onDidChangeModelContent(function(){
    document.getElementById('s-lines').textContent=ED.getModel().getLineCount().toLocaleString('de');
    clearTimeout(simDebounce); simDebounce=setTimeout(runSim,800);
  });
  ED.onDidChangeCursorPosition(function(e){
    document.getElementById('s-cur').textContent=e.position.lineNumber+':'+e.position.column;
  });
  document.getElementById('btn-theme').textContent = THEME==='krl-dark'?'\u2600 Hell':'\uD83C\uDF19 Dunkel';

  // Three.js init nach DOM-Layout
  setTimeout(function(){
    simInit();
    runSim();
  }, 150);
});
