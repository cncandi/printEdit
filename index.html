<!DOCTYPE html>
<html lang="de" data-theme="krl-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>printEdit – Datentechnik Reitz</title>
<style>
/* ── KUKA-Theme (identisch zu cnc-technik.de/kuka) ───────── */
:root,[data-theme=krl-dark]{
  --bg1:#1E1E1E; --bg2:#252526; --bg3:#2D2D2D; --bg4:#37373D;
  --bg-hover:#3C3C3C; --bg-input:#1E1E1E;
  --border:#454545; --border2:#3C3C3C;
  --text1:#CCCCCC; --text2:#999999; --text3:#666666; --text-on:#FFFFFF;
  --accent:#007ACC;
  --scrollbar-track:#1E1E1E; --scrollbar-thumb:#424242; --scrollbar-thumb-hover:#555555;
  --sim-bg:#141414; --sim-extrusion:#f05500;
}
[data-theme=krl-light]{
  --bg1:#FFFFFF; --bg2:#F3F3F3; --bg3:#EBEBEB; --bg4:#C8DCFF;
  --bg-hover:#DCDCDC; --bg-input:#FFFFFF;
  --border:#C0C0C0; --border2:#D8D8D8;
  --text1:#1E1E1E; --text2:#555555; --text3:#888888; --text-on:#000000;
  --accent:#007ACC;
  --scrollbar-track:#F0F0F0; --scrollbar-thumb:#BBBBBB; --scrollbar-thumb-hover:#999999;
  --sim-bg:#E8E8E8; --sim-extrusion:#cc3300;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg1);color:var(--text1)}

/* ── Header ─────────────────────────────────────────────── */
.hdr{
  height:35px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:4px;flex-shrink:0;
}
.hdr-logo{color:var(--accent);font-weight:700;font-size:.85em;letter-spacing:1px;font-family:monospace;padding:0 6px}
.hdr-brand{color:var(--text3);font-size:.72em;margin-right:4px}
.hdr-sep{width:1px;height:16px;background:var(--border);flex-shrink:0;margin:0 2px}
.hdr-btn{
  background:transparent;border:1px solid transparent;color:var(--text2);
  border-radius:3px;padding:0 10px;cursor:pointer;font-size:.78em;
  font-family:inherit;height:24px;display:flex;align-items:center;gap:4px;
  white-space:nowrap;flex-shrink:0;
}
.hdr-btn:hover{background:var(--bg-hover);color:var(--text1);border-color:var(--border)}
.hdr-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.hdr-btn.primary:hover{opacity:.85}
.hdr-btn.active{color:var(--accent);border-color:var(--accent)}
.hdr-btn.active:hover{background:var(--bg-hover)}
.hdr-spacer{flex:1}
#hdr-filename{color:var(--text3);font-size:.74em;font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Status bar ─────────────────────────────────────────── */
.status{
  height:22px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px;gap:14px;
  font-size:.72em;color:var(--text3);font-family:monospace;flex-shrink:0;overflow:hidden;
}
.status .v{color:var(--text2)}
.status .va{color:var(--accent)}
#s-msg{color:#4ec9b0;margin-left:auto;white-space:nowrap}

/* ── Main ────────────────────────────────────────────────── */
.main{display:flex;height:calc(100vh - 57px);overflow:hidden}
.editor-panel{flex:1;min-width:0;display:flex;flex-direction:column;min-width:200px}
#editor-wrap{flex:1;min-height:0}

/* ── Resize handle ───────────────────────────────────────── */
.rsz{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0}
.rsz:hover,.rsz.active{background:var(--accent)}

/* ── Right panel ─────────────────────────────────────────── */
.right-panel{flex:1;min-width:260px;display:flex;flex-direction:column;border-left:1px solid var(--border)}

/* ── Sim toolbar ─────────────────────────────────────────── */
.sim-bar{
  height:35px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 6px;gap:3px;flex-shrink:0;
}
.sim-lbl{color:var(--text3);font-size:.7em;font-family:monospace;letter-spacing:.5px;flex-shrink:0;padding:0 2px}
.s-btn{
  background:transparent;border:1px solid transparent;color:var(--text2);
  border-radius:3px;padding:0 6px;cursor:pointer;font-size:.78em;
  font-family:monospace;height:22px;display:flex;align-items:center;flex-shrink:0;
}
.s-btn:hover{background:var(--bg-hover);color:var(--text1)}
.s-btn.active{color:var(--accent);border-color:var(--accent)}
.s-btn.play{color:var(--accent);border-color:var(--accent);font-size:.9em}
.s-btn.play.running{background:var(--accent);color:#fff;border-color:var(--accent)}
.layer-disp{color:var(--accent);font-family:monospace;font-size:.8em;min-width:66px;text-align:center;flex-shrink:0}
.sim-sp{flex:1}

/* ── Layer slider ────────────────────────────────────────── */
.slider-row{
  height:28px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0;
}
#layer-slider{flex:1;accent-color:var(--accent);cursor:pointer;height:14px}
.layer-z{color:var(--text3);font-family:monospace;font-size:.7em;min-width:76px;text-align:right;flex-shrink:0}

/* ── Canvas container ────────────────────────────────────── */
.sim-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:var(--sim-bg)}
#sim-canvas{display:block;width:100%;height:100%}
.sim-overlay{position:absolute;bottom:6px;left:8px;font-family:monospace;font-size:.7em;color:var(--text3);pointer-events:none;line-height:1.8}
.sim-loading{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,.5);color:var(--accent);font-family:monospace;font-size:.82em;z-index:10}
.sim-loading.on{display:flex}

/* ── Opt panel ───────────────────────────────────────────── */
.tube-row{height:28px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0;font-family:monospace;font-size:.72em;color:var(--text3)}
.tube-row input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;height:14px}
.opt-panel{border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;padding:7px}
.opt-title{color:var(--text3);font-size:.68em;font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.opt-btn{
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  border-radius:3px;padding:5px 6px;cursor:pointer;font-size:.72em;
  font-family:inherit;text-align:left;line-height:1.4;
}
.opt-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg-hover)}

/* ── Drop overlay ────────────────────────────────────────── */
.drop-ov{display:none;position:fixed;inset:0;background:rgba(0,122,204,.08);border:2px dashed var(--accent);z-index:999;align-items:center;justify-content:center;font-size:1.2em;color:var(--accent);font-family:monospace;pointer-events:none}
.drop-ov.on{display:flex}

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-logo">printEdit</span>
  <span class="hdr-brand">Datentechnik Reitz</span>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="loadFile()">📂 Laden</button>
  <button class="hdr-btn" onclick="saveFile()">💾 Speichern</button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn primary" onclick="runSim()">▶ Simulieren</button>
  <button class="hdr-btn active" onclick="toggleTubes()" id="btn-tubes">Tubes: ein</button>
  <button class="hdr-btn" onclick="toggleTravel()" id="btn-travel">Travel: aus</button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="toggleTheme()" id="btn-theme">☀ Hell</button>
  <div class="hdr-spacer"></div>
  <span id="hdr-filename">Keine Datei</span>
</div>

<div class="status">
  <span>Zeilen: <span class="v" id="s-lines">–</span></span>
  <span>Layer: <span class="va" id="s-layers">–</span></span>
  <span>Zeit: <span class="v" id="s-time">–</span></span>
  <span>Filament: <span class="v" id="s-fil">–</span></span>
  <span>Cursor: <span class="v" id="s-cur">1:1</span></span>
  <span id="s-msg"></span>
</div>

<div class="main">
  <div class="editor-panel">
    <div id="editor-wrap"></div>
  </div>
  <div class="rsz" id="rsz"></div>
  <div class="right-panel" id="right-panel">
    <div class="sim-bar">
      <button class="s-btn play" id="btn-play" onclick="playAnim()" title="Abspielen">▶</button>
      <button class="s-btn" id="btn-stop" onclick="stopAnim()" title="Stop">■</button>
      <div style="width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0"></div>
      <span class="sim-lbl">LAYER</span>
      <button class="s-btn" onclick="layerFirst()">|◄</button>
      <button class="s-btn" onclick="layerStep(-10)">«</button>
      <button class="s-btn" onclick="layerStep(-1)">‹</button>
      <span class="layer-disp" id="layer-disp">– / –</span>
      <button class="s-btn" onclick="layerStep(1)">›</button>
      <button class="s-btn" onclick="layerStep(10)">»</button>
      <button class="s-btn" onclick="layerLast()">►|</button>
      <button class="s-btn active" id="btn-cumul" onclick="toggleCumul()">CUM</button>
    </div>
    <div class="slider-row">
      <span class="sim-lbl">Z</span>
      <input type="range" id="layer-slider" min="1" max="100" value="100" oninput="sliderInput(this.value)">
      <span class="layer-z" id="layer-z-val">–</span>
      <div style="width:1px;height:14px;background:var(--border);margin:0 6px;flex-shrink:0"></div>
      <span class="sim-lbl">Geschw.</span>
      <input type="range" id="speed-slider" min="1" max="100" value="50"
             style="width:80px;accent-color:var(--accent);cursor:pointer;height:14px;flex-shrink:0"
             oninput="document.getElementById('speed-val').textContent=this.value">
      <span id="speed-val" style="color:var(--accent);font-family:monospace;font-size:.72em;min-width:24px;text-align:right;flex-shrink:0">50</span>
    </div>
    <div class="sim-wrap" id="sim-wrap">
      <canvas id="sim-canvas"></canvas>
      <div class="sim-overlay" id="sim-overlay"></div>
      <div class="sim-loading" id="sim-loading">Simuliere…</div>
    </div>
    <div class="tube-row">
      <span>Tube-Dicke</span>
      <input type="range" id="tube-slider" min="1" max="30" value="6"
             oninput="document.getElementById('tube-val').textContent=(this.value/10).toFixed(1)+' mm';applyTubeWidth()">
      <span id="tube-val" style="color:var(--accent);min-width:40px;text-align:right">0.6 mm</span>
    </div>
    <div class="opt-panel">
      <div class="opt-title">Optimierungen</div>
      <div class="opt-grid">
        <button class="opt-btn" onclick="optDuplicates()">⚡ Duplikate<br>entfernen</button>
        <button class="opt-btn" onclick="optComments()">✂ Kommentare<br>löschen</button>
        <button class="opt-btn" onclick="optEmptyLines()">◻ Leerzeilen<br>löschen</button>
        <button class="opt-btn" onclick="optFeed()">⇄ Vorschub<br>normieren</button>
        <button class="opt-btn" onclick="optStartGcode()">↑ Start-<br>G-code</button>
        <button class="opt-btn" onclick="optEndGcode()">↓ End-<br>G-code</button>
      </div>
    </div>
  </div>
</div>

<div class="drop-ov" id="drop-ov">G-code hier ablegen</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gcode-preview@2.18.0/dist/gcode-preview.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════════════
var THEME = localStorage.getItem('pe_theme') || 'krl-dark';

function applyTheme(t) {
  THEME = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('pe_theme', t);
  var isDark = t === 'krl-dark';
  var btn = document.getElementById('btn-theme');
  btn.textContent = isDark ? '☀ Hell' : '🌙 Dunkel';
  if (window.ED) {
    monaco.editor.setTheme(isDark ? 'pe-dark' : 'pe-light');
  }
  if (PREVIEW) {
    PREVIEW.backgroundColor = isDark ? '#141414' : '#E8E8E8';
    PREVIEW.render();
  }
}

function toggleTheme() {
  applyTheme(THEME === 'krl-dark' ? 'krl-light' : 'krl-dark');
}

// Apply saved theme immediately
document.documentElement.setAttribute('data-theme', THEME);

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var PREVIEW     = null;
var CURLAYER    = 0;
var MAXLAYER    = 0;
var CUMULATIVE  = true;
var SHOW_TRAVEL = false;
var SHOW_TUBES  = true;
var PLAYING     = false;
var PLAY_TIMER  = null;
var PLAY_RAF    = null;
var TUBE_WIDTH  = 0.6;

// ═══════════════════════════════════════════════════════════
//  GCODE-PREVIEW
// ═══════════════════════════════════════════════════════════
function initPreview() {
  var canvas = document.getElementById('sim-canvas');
  if (PREVIEW) { PREVIEW.dispose(); PREVIEW.cancelAnimation(); PREVIEW = null; }
  var isDark = THEME === 'krl-dark';
  // Ensure canvas has layout dimensions
  var wrap = document.getElementById('sim-wrap');
  canvas.style.width  = wrap.offsetWidth  + 'px';
  canvas.style.height = wrap.offsetHeight + 'px';
  PREVIEW = GCodePreview.init({
    canvas:               canvas,
    extrusionColor:       '#f05500',
    topLayerColor:        '#ff8800',
    lastSegmentColor:     '#ffffff',
    travelColor:          isDark ? '#334466' : '#aaaacc',
    backgroundColor:      isDark ? '#141414' : '#E8E8E8',
    renderTravel:         SHOW_TRAVEL,
    renderTubes:          SHOW_TUBES,
    extrusionWidth:       TUBE_WIDTH,
    lineHeight:           TUBE_WIDTH * 0.33,
    buildVolume:          { x: 220, y: 220, z: 250 },
    initialCameraPosition:[0, 200, 280],
  });
  PREVIEW.resize();
  // Keyboard: arrow keys pan, +/- zoom
  PREVIEW.controls.listenToKeyEvents(document);
  document.removeEventListener('keydown', onSimKey, false);
  document.addEventListener('keydown', onSimKey, false);
}

function onSimKey(e) {
  if (!PREVIEW) return;
  var factor;
  if (e.key === '+' || e.key === '=' || e.key === 'NumpadAdd') {
    factor = 0.85;
  } else if (e.key === '-' || e.key === 'NumpadSubtract') {
    factor = 1.18;
  } else return;
  e.preventDefault();
  var cam = PREVIEW.camera, tgt = PREVIEW.controls.target;
  cam.position.sub(tgt).multiplyScalar(factor).add(tgt);
  PREVIEW.controls.update();
}

function applyTubeWidth() {
  TUBE_WIDTH = parseFloat(document.getElementById('tube-slider').value) / 10;
  initPreview();
  runSim();
}

function previewReady() {
  // Delay to ensure DOM layout is complete
  setTimeout(function() {
    initPreview();
    runSim();
    var ro = new ResizeObserver(function() {
      if (PREVIEW) {
        var wrap = document.getElementById('sim-wrap');
        var canvas = document.getElementById('sim-canvas');
        canvas.style.width  = wrap.offsetWidth  + 'px';
        canvas.style.height = wrap.offsetHeight + 'px';
        PREVIEW.resize();
      }
    });
    ro.observe(document.getElementById('sim-wrap'));
  }, 100);
}

// ═══════════════════════════════════════════════════════════
//  MONACO
// ═══════════════════════════════════════════════════════════
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {

  monaco.languages.register({ id: 'gcode' });
  monaco.languages.setMonarchTokensProvider('gcode', {
    tokenizer: {
      root: [
        [/;.*$/,           'comment'],
        [/\([^)]*\)/,      'comment'],
        [/[GM]\d+(\.\d+)?/,'keyword'],
        [/[XYZEF]-?[\d.]+/,'number.float'],
        [/[IJKRS]-?[\d.]+/,'number'],
        [/[TQP]\d*/,       'type'],
      ]
    }
  });

  // Dark theme (VS Code-like, gleich wie KUKA editor)
  monaco.editor.defineTheme('pe-dark', {
    base: 'vs-dark', inherit: true,
    rules: [
      { token: 'comment',      foreground: '6A9955', fontStyle: 'italic' },
      { token: 'keyword',      foreground: '569CD6', fontStyle: 'bold'   },
      { token: 'number.float', foreground: 'B5CEA8' },
      { token: 'number',       foreground: 'B5CEA8' },
      { token: 'type',         foreground: '4EC9B0' },
    ],
    colors: {
      'editor.background':                '#1E1E1E',
      'editor.foreground':                '#CCCCCC',
      'editorLineNumber.foreground':       '#858585',
      'editorLineNumber.activeForeground': '#C6C6C6',
      'editor.selectionBackground':        '#264F78',
      'editorCursor.foreground':           '#AEAFAD',
      'editor.lineHighlightBackground':    '#2D2D2D',
    }
  });

  // Light theme
  monaco.editor.defineTheme('pe-light', {
    base: 'vs', inherit: true,
    rules: [
      { token: 'comment',      foreground: '008000', fontStyle: 'italic' },
      { token: 'keyword',      foreground: '0000FF', fontStyle: 'bold'   },
      { token: 'number.float', foreground: '098658' },
      { token: 'number',       foreground: '098658' },
      { token: 'type',         foreground: '267F99' },
    ],
    colors: {
      'editor.background':                '#FFFFFF',
      'editor.foreground':                '#1E1E1E',
      'editorLineNumber.foreground':       '#237893',
      'editor.lineHighlightBackground':    '#F0F0F0',
    }
  });

  window.ED = monaco.editor.create(document.getElementById('editor-wrap'), {
    language: 'gcode',
    theme:    THEME === 'krl-dark' ? 'pe-dark' : 'pe-light',
    value:    SAMPLE_GCODE,
    fontSize: 13,
    fontFamily: "Consolas,'Courier New',monospace",
    lineNumbers: 'on',
    minimap:  { enabled: true, scale: 1 },
    scrollBeyondLastLine: false,
    wordWrap: 'off',
    folding:  false,
    quickSuggestions: false,
    parameterHints:   { enabled: false },
    suggestOnTriggerCharacters: false,
    mouseWheelZoom: true,
  });

  var simDebounce;
  ED.onDidChangeModelContent(function () {
    document.getElementById('s-lines').textContent =
      ED.getModel().getLineCount().toLocaleString('de');
    clearTimeout(simDebounce);
    simDebounce = setTimeout(runSim, 800);
  });
  ED.onDidChangeCursorPosition(function (e) {
    document.getElementById('s-cur').textContent =
      e.position.lineNumber + ':' + e.position.column;
  });

  // Apply saved theme to button label
  var btn = document.getElementById('btn-theme');
  btn.textContent = THEME === 'krl-dark' ? '☀ Hell' : '🌙 Dunkel';

  previewReady();
});

// ═══════════════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════════════
function runSim() {
  if (!window.ED || !PREVIEW) return;
  stopAnim();
  var text  = ED.getValue();
  var lines = ED.getModel().getLineCount();
  document.getElementById('s-lines').textContent = lines.toLocaleString('de');
  var loading = document.getElementById('sim-loading');
  if (lines > 5000) loading.classList.add('on');
  setTimeout(function () {
    try {
      PREVIEW.clear();
      PREVIEW.resize();
      PREVIEW.processGCode(text);
      MAXLAYER = PREVIEW.parser.layers.length;
      CURLAYER = MAXLAYER;
      var sl = document.getElementById('layer-slider');
      sl.max = MAXLAYER || 1; sl.value = MAXLAYER;
      updateLayerView();
      updateStats();
    } catch(e) { flash('Fehler: ' + e.message); }
    loading.classList.remove('on');
    flash('Simulation · ' + MAXLAYER + ' Layer');
  }, 0);
}

function setLayerTo(n) {
  if (!PREVIEW || !MAXLAYER) return;
  CURLAYER = Math.max(1, Math.min(MAXLAYER, n));
  document.getElementById('layer-slider').value = CURLAYER;
  updateLayerView();
}

function updateLayerView() {
  if (!PREVIEW || !MAXLAYER) return;
  PREVIEW.endLayer      = CURLAYER;
  PREVIEW.singleLayerMode = !CUMULATIVE;
  PREVIEW.render();
  document.getElementById('layer-disp').textContent = CURLAYER + ' / ' + MAXLAYER;
  var pl   = PREVIEW.parser.layers[CURLAYER - 1];
  var zStr = pl ? pl.z.toFixed(3) + ' mm' : '–';
  document.getElementById('layer-z-val').textContent   = zStr;
  document.getElementById('sim-overlay').textContent   = 'Layer ' + CURLAYER + ' / ' + MAXLAYER + '   Z = ' + zStr;
}

function updateStats() {
  if (!PREVIEW) return;
  document.getElementById('s-layers').textContent = PREVIEW.parser.layers.length;
  var totalE=0, totalTime=0, pX=0,pY=0,pZ=0,pE=0,cF=2000;
  PREVIEW.parser.lines.forEach(function(line) {
    var l=line.trim().toUpperCase(), m;
    if (!/^G0\b|^G00\b|^G1\b|^G01\b/.test(l)) return;
    var nx=(m=l.match(/X(-?[\d.]+)/))?+m[1]:pX;
    var ny=(m=l.match(/Y(-?[\d.]+)/))?+m[1]:pY;
    var nz=(m=l.match(/Z(-?[\d.]+)/))?+m[1]:pZ;
    var ne=(m=l.match(/E(-?[\d.]+)/))?+m[1]:pE;
    if ((m=l.match(/F(-?[\d.]+)/))) cF=+m[1];
    var d=Math.sqrt(Math.pow(nx-pX,2)+Math.pow(ny-pY,2)+Math.pow(nz-pZ,2));
    if (cF>0) totalTime+=d/cF*60;
    if (ne>pE) totalE+=ne-pE;
    pX=nx;pY=ny;pZ=nz;pE=ne;
  });
  var mm=Math.floor(totalTime/60), ss=Math.floor(totalTime%60);
  document.getElementById('s-time').textContent = mm+'m '+String(ss).padStart(2,'0')+'s';
  document.getElementById('s-fil').textContent  = totalE.toFixed(1)+' mm';
}

// ═══════════════════════════════════════════════════════════
//  LAYER CONTROLS
// ═══════════════════════════════════════════════════════════
function layerStep(d)   { stopAnim(); setLayerTo(CURLAYER + d); }
function layerFirst()   { stopAnim(); setLayerTo(1); }
function layerLast()    { stopAnim(); setLayerTo(MAXLAYER); }
function sliderInput(v) { stopAnim(); setLayerTo(parseInt(v)); }

function playAnim() {
  if (PLAYING) return;
  if (!PREVIEW || !MAXLAYER) return;
  // Start from layer 1 if at end
  if (CURLAYER >= MAXLAYER) {
    CURLAYER = 0;
    document.getElementById('layer-slider').value = 0;
  }
  PLAYING = true;
  document.getElementById('btn-play').classList.add('running');
  playStep();
}

function stopAnim() {
  if (!PLAYING && PLAY_TIMER === null && PLAY_RAF === null) return;
  PLAYING = false;
  if (PLAY_TIMER !== null) { clearTimeout(PLAY_TIMER); PLAY_TIMER = null; }
  if (PLAY_RAF   !== null) { cancelAnimationFrame(PLAY_RAF); PLAY_RAF = null; }
  var pb = document.getElementById('btn-play');
  if (pb) pb.classList.remove('running');
}

function playStep() {
  if (!PLAYING) return;
  if (CURLAYER >= MAXLAYER) { stopAnim(); return; }

  CURLAYER++;
  document.getElementById('layer-slider').value = CURLAYER;
  PREVIEW.endLayer      = CURLAYER;
  PREVIEW.singleLayerMode = !CUMULATIVE;
  PREVIEW.render();

  // Sync layer display
  document.getElementById('layer-disp').textContent = CURLAYER + ' / ' + MAXLAYER;
  var pl = PREVIEW.parser.layers[CURLAYER - 1];
  if (pl) {
    var zStr = pl.z.toFixed(3) + ' mm';
    document.getElementById('layer-z-val').textContent = zStr;
    document.getElementById('sim-overlay').textContent = 'Layer ' + CURLAYER + ' / ' + MAXLAYER + '   Z = ' + zStr;
    // Scroll editor to the layer's start line
    if (window.ED) {
      var lineNum = pl.lineNumber + 1; // gcode-preview is 0-based
      ED.revealLineInCenter(lineNum);
      ED.setPosition({ lineNumber: lineNum, column: 1 });
    }
  }

  var speed = parseInt(document.getElementById('speed-slider').value);
  if (speed >= 100) {
    PLAY_RAF = requestAnimationFrame(playStep);
  } else {
    // speed 1 → 990ms, speed 99 → 10ms, speed 100 → rAF
    var delay = Math.round((100 - speed) * 10);
    PLAY_TIMER = setTimeout(function() { PLAY_TIMER = null; playStep(); }, delay);
  }
}

function toggleCumul() {
  CUMULATIVE = !CUMULATIVE;
  document.getElementById('btn-cumul').classList.toggle('active', CUMULATIVE);
  document.getElementById('btn-cumul').textContent = CUMULATIVE ? 'CUM' : 'SGL';
  updateLayerView();
}
function toggleTubes() {
  SHOW_TUBES = !SHOW_TUBES;
  var b = document.getElementById('btn-tubes');
  b.textContent = 'Tubes: ' + (SHOW_TUBES ? 'ein' : 'aus');
  b.classList.toggle('active', SHOW_TUBES);
  initPreview(); runSim();
}
function toggleTravel() {
  if (!PREVIEW) return;
  SHOW_TRAVEL = !SHOW_TRAVEL;
  var b = document.getElementById('btn-travel');
  b.textContent = 'Travel: ' + (SHOW_TRAVEL ? 'ein' : 'aus');
  b.classList.toggle('active', SHOW_TRAVEL);
  PREVIEW.renderTravel = SHOW_TRAVEL;
  PREVIEW.render();
}

// ═══════════════════════════════════════════════════════════
//  FILE I/O
// ═══════════════════════════════════════════════════════════
function loadFile() {
  var inp = document.createElement('input');
  inp.type='file'; inp.accept='.gcode,.g,.nc,.ngc,.txt';
  inp.onchange = function(e) {
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){ applyFile(ev.target.result,f.name); };
    r.readAsText(f);
  };
  inp.click();
}
function saveFile() {
  var blob=new Blob([ED.getValue()],{type:'text/plain'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var fn=document.getElementById('hdr-filename').textContent;
  a.download=(fn==='Keine Datei'?'output':fn.replace(/\.gcode$/i,''))+'.gcode';
  a.click(); flash('Gespeichert: '+a.download);
}
function applyFile(text,name) {
  ED.setValue(text);
  document.getElementById('hdr-filename').textContent=name||'output.gcode';
  runSim();
}

// ═══════════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════════
var ov=document.getElementById('drop-ov');
document.addEventListener('dragover',  function(e){e.preventDefault();ov.classList.add('on');});
document.addEventListener('dragleave', function(e){if(!e.relatedTarget)ov.classList.remove('on');});
document.addEventListener('drop', function(e){
  e.preventDefault(); ov.classList.remove('on');
  var f=e.dataTransfer.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){applyFile(ev.target.result,f.name);};
  r.readAsText(f);
});

(function(){
  var rz=document.getElementById('rsz'), rp=document.getElementById('right-panel');
  var dr=false, sx, sw;
  rz.addEventListener('mousedown',function(e){dr=true;sx=e.clientX;sw=rp.offsetWidth;rz.classList.add('active');e.preventDefault();});
  document.addEventListener('mousemove',function(e){
    if(!dr) return;
    rp.style.width=Math.max(260,Math.min(800,sw+(sx-e.clientX)))+'px';
    if(window.ED) ED.layout();
    if(PREVIEW)   PREVIEW.resize();
  });
  document.addEventListener('mouseup',function(){dr=false;rz.classList.remove('active');});
})();
window.addEventListener('resize',function(){
  if(window.ED) ED.layout();
  if(PREVIEW)   PREVIEW.resize();
});

//  OPTIMIZATIONS
// ═══════════════════════════════════════════════════════════
function getLines()       {return ED.getValue().split('\n');}
function setLines(ll,msg) {ED.setValue(ll.join('\n'));flash(msg||'Fertig');}

function optComments()  {setLines(getLines().map(function(l){return l.split(';')[0].replace(/\([^)]*\)/g,'').trimEnd();}),'Kommentare entfernt');}
function optEmptyLines(){setLines(getLines().filter(function(l){return l.trim()!=='';}), 'Leerzeilen entfernt');}
function optDuplicates(){
  var cx='__',cy='__',cz='__',cf='__', before=getLines().length;
  var out=getLines().filter(function(line){
    var l=line.trim().toUpperCase(),m;
    if(!/^G0\b|^G00\b|^G1\b|^G01\b/.test(l)) return true;
    var nx=(m=l.match(/X(-?[\d.]+)/))?m[1]:cx;
    var ny=(m=l.match(/Y(-?[\d.]+)/))?m[1]:cy;
    var nz=(m=l.match(/Z(-?[\d.]+)/))?m[1]:cz;
    var nf=(m=l.match(/F(-?[\d.]+)/))?m[1]:cf;
    var ne=l.match(/E(-?[\d.]+)/);
    if(nx===cx&&ny===cy&&nz===cz&&nf===cf&&!ne) return false;
    cx=nx;cy=ny;cz=nz;cf=nf; return true;
  });
  setLines(out,'Duplikate entfernt · '+(before-out.length)+' Zeilen');
}
function optFeed(){
  var f0=prompt('Vorschub G0 (mm/min):','9000'), f1=prompt('Vorschub G1 (mm/min):','1500');
  if(!f0||!f1) return;
  setLines(getLines().map(function(line){
    var l=line.trim().toUpperCase();
    if(/^G0\b|^G00\b/.test(l)) return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f0;
    if(/^G1\b|^G01\b/.test(l)&&!line.match(/E/i)) return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f1;
    return line;
  }),'Vorschub normiert');
}
function optStartGcode(){
  ED.setValue(['G28        ; Home','G29        ; Bed leveling','G1 Z15 F5000','G92 E0','G1 F140 E30','G92 E0',''].join('\n')+ED.getValue());
  flash('Start-G-code eingefügt');
}
function optEndGcode(){
  ED.setValue(ED.getValue()+['\nG91','G1 E-2 F2700','G1 Z10 F3000','G90','G28 X0 Y0','M104 S0','M140 S0','M84'].join('\n'));
  flash('End-G-code eingefügt');
}

function flash(msg){
  var el=document.getElementById('s-msg');
  el.textContent=msg; clearTimeout(flash._t);
  flash._t=setTimeout(function(){el.textContent='';},3500);
}
