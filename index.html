<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>printEdit – Datentechnik Reitz</title>
<style>
:root {
  --bg0:#0d1117; --bg1:#161b22; --bg2:#21262d; --bg3:#30363d; --bg4:#13181f;
  --acc:#f05500; --grn:#3fb950; --red:#f85149;
  --bdr:#30363d; --txt:#e6edf3; --txt2:#8b949e; --txt3:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg0);color:var(--txt)}

/* ── Header ─────────────────────────────────────────────── */
.hdr{height:40px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0}
.hdr-logo{color:var(--acc);font-weight:700;font-size:.92em;letter-spacing:1.5px;font-family:monospace}
.hdr-brand{color:var(--txt3);font-size:.72em;margin-right:6px}
.hdr-sep{width:1px;height:18px;background:var(--bdr);flex-shrink:0}
.hdr-btn{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt2);border-radius:3px;padding:0 11px;cursor:pointer;font-size:.78em;font-family:inherit;height:26px;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.hdr-btn:hover{border-color:var(--txt3);color:var(--txt)}
.hdr-btn.acc{border-color:var(--acc);color:var(--acc)}
.hdr-btn.acc:hover{background:rgba(240,85,0,.12)}
.hdr-spacer{flex:1}
#hdr-filename{color:var(--txt3);font-size:.76em;font-family:monospace;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Status bar ─────────────────────────────────────────── */
.status{height:24px;background:var(--bg4);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px;gap:14px;font-size:.73em;color:var(--txt3);font-family:monospace;flex-shrink:0;overflow:hidden}
.status .v{color:var(--txt2)}
.status .va{color:var(--acc)}
.status .vg{color:var(--grn)}
#s-msg{color:var(--grn);margin-left:auto;white-space:nowrap}

/* ── Main layout ─────────────────────────────────────────── */
.main{display:flex;height:calc(100vh - 64px);overflow:hidden}
.editor-panel{flex:1;min-width:0;display:flex;flex-direction:column}
#editor-wrap{flex:1;min-height:0}

/* ── Resize handle ───────────────────────────────────────── */
.rsz{width:4px;background:var(--bg3);cursor:col-resize;flex-shrink:0;transition:background .15s}
.rsz:hover,.rsz.active{background:var(--acc)}

/* ── Right panel ─────────────────────────────────────────── */
.right-panel{width:440px;flex-shrink:0;display:flex;flex-direction:column;border-left:2px solid var(--acc)}

/* ── Sim toolbar ─────────────────────────────────────────── */
.sim-bar{height:36px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 8px;gap:5px;flex-shrink:0}
.sim-lbl{color:var(--txt3);font-size:.72em;font-family:monospace;letter-spacing:.5px;flex-shrink:0}
.s-btn{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt2);border-radius:3px;padding:0 7px;cursor:pointer;font-size:.78em;font-family:monospace;height:22px;display:flex;align-items:center;flex-shrink:0}
.s-btn:hover{color:var(--txt);border-color:var(--txt3)}
.s-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(240,85,0,.08)}
.layer-disp{color:var(--acc);font-family:monospace;font-size:.82em;min-width:72px;text-align:center;flex-shrink:0}

/* ── Layer slider ────────────────────────────────────────── */
.layer-slider-wrap{padding:4px 8px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;flex-shrink:0}
#layer-slider{flex:1;accent-color:var(--acc);cursor:pointer;height:16px}
.layer-z{color:var(--txt3);font-family:monospace;font-size:.73em;min-width:80px;text-align:right;flex-shrink:0}

/* ── Canvas container ────────────────────────────────────── */
.sim-wrap{flex:1;min-height:0;position:relative;overflow:hidden;background:#080c12}
#sim-canvas{display:block;width:100%;height:100%}

/* ── Canvas overlay info ─────────────────────────────────── */
.sim-overlay{position:absolute;bottom:8px;left:8px;font-family:monospace;font-size:.7em;color:var(--txt3);pointer-events:none;line-height:1.8}

/* ── Opt panel ───────────────────────────────────────────── */
.opt-panel{border-top:1px solid var(--bdr);background:var(--bg1);flex-shrink:0;padding:8px}
.opt-title{color:var(--txt3);font-size:.7em;font-family:monospace;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.opt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.opt-btn{background:var(--bg2);border:1px solid var(--bdr);color:var(--txt2);border-radius:3px;padding:6px 6px;cursor:pointer;font-size:.74em;font-family:monospace;text-align:left;line-height:1.35}
.opt-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── Drop overlay ────────────────────────────────────────── */
.drop-ov{display:none;position:fixed;inset:0;background:rgba(240,85,0,.12);border:3px dashed var(--acc);z-index:999;align-items:center;justify-content:center;font-size:1.3em;color:var(--acc);font-family:monospace;pointer-events:none}
.drop-ov.on{display:flex}

/* ── Loading indicator ───────────────────────────────────── */
.sim-loading{display:none;position:absolute;inset:0;align-items:center;justify-content:center;background:rgba(8,12,18,.7);color:var(--acc);font-family:monospace;font-size:.85em;z-index:10}
.sim-loading.on{display:flex}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-logo">printEdit</span>
  <span class="hdr-brand">Datentechnik Reitz</span>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="loadFile()">📂 Laden</button>
  <button class="hdr-btn" onclick="saveFile()">💾 Speichern</button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn acc" onclick="runSim()">▶ Simulieren</button>
  <button class="hdr-btn" onclick="toggleTravel()" id="btn-travel">Travel: aus</button>
  <div class="hdr-spacer"></div>
  <span id="hdr-filename">Keine Datei</span>
</div>

<div class="status">
  <span>Zeilen: <span class="v" id="s-lines">–</span></span>
  <span>Layer: <span class="va" id="s-layers">–</span></span>
  <span>Zeit: <span class="v" id="s-time">–</span></span>
  <span>Filament: <span class="v" id="s-fil">–</span></span>
  <span>Cursor: <span class="vg" id="s-cur">1:1</span></span>
  <span id="s-msg"></span>
</div>

<div class="main">
  <div class="editor-panel">
    <div id="editor-wrap"></div>
  </div>

  <div class="rsz" id="rsz"></div>

  <div class="right-panel" id="right-panel">
    <div class="sim-bar">
      <span class="sim-lbl">LAYER</span>
      <button class="s-btn" onclick="layerFirst()" title="Erster Layer">|◄</button>
      <button class="s-btn" onclick="layerStep(-10)">«</button>
      <button class="s-btn" onclick="layerStep(-1)">‹</button>
      <span class="layer-disp" id="layer-disp">– / –</span>
      <button class="s-btn" onclick="layerStep(1)">›</button>
      <button class="s-btn" onclick="layerStep(10)">»</button>
      <button class="s-btn" onclick="layerLast()" title="Letzter Layer">►|</button>
      <button class="s-btn active" id="btn-cumul" onclick="toggleCumul()" title="Kumulativ / Einzellayer">CUM</button>
    </div>

    <div class="layer-slider-wrap">
      <span class="sim-lbl">Z</span>
      <input type="range" id="layer-slider" min="1" max="100" value="100" oninput="sliderInput(this.value)">
      <span class="layer-z" id="layer-z-val">–</span>
    </div>

    <div class="sim-wrap" id="sim-wrap">
      <canvas id="sim-canvas"></canvas>
      <div class="sim-overlay" id="sim-overlay"></div>
      <div class="sim-loading" id="sim-loading">Simuliere…</div>
    </div>

    <div class="opt-panel">
      <div class="opt-title">Optimierungen</div>
      <div class="opt-grid">
        <button class="opt-btn" onclick="optDuplicates()">⚡ Duplikate<br>entfernen</button>
        <button class="opt-btn" onclick="optComments()">✂ Kommentare<br>löschen</button>
        <button class="opt-btn" onclick="optEmptyLines()">◻ Leerzeilen<br>löschen</button>
        <button class="opt-btn" onclick="optFeed()">⇄ Vorschub<br>normieren</button>
        <button class="opt-btn" onclick="optStartGcode()">↑ Start-<br>G-code</button>
        <button class="opt-btn" onclick="optEndGcode()">↓ End-<br>G-code</button>
      </div>
    </div>
  </div>
</div>

<div class="drop-ov" id="drop-ov">G-code Datei hier ablegen</div>

<!-- Dependencies: Three.js (UMD), lil-gui (UMD), gcode-preview (UMD) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gcode-preview@2.18.0/dist/gcode-preview.js"></script>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var PREVIEW    = null;   // GCodePreview instance
var CURLAYER   = 0;      // current end-layer (0-based)
var MAXLAYER   = 0;      // total layer count
var CUMULATIVE = true;   // show all layers up to CURLAYER
var SHOW_TRAVEL = false;

// ═══════════════════════════════════════════════════════════
//  GCODE-PREVIEW INIT
// ═══════════════════════════════════════════════════════════
function initPreview() {
  var canvas = document.getElementById('sim-canvas');
  if (PREVIEW) {
    PREVIEW.dispose();
    PREVIEW.cancelAnimation();
    PREVIEW = null;
  }
  PREVIEW = GCodePreview.init({
    canvas:               canvas,
    extrusionColor:       '#f05500',
    topLayerColor:        '#ffaa44',
    lastSegmentColor:     '#ffffff',
    travelColor:          '#2a3a55',
    backgroundColor:      '#080c12',
    renderTravel:         SHOW_TRAVEL,
    buildVolume:          { x: 220, y: 220, z: 250 },
    initialCameraPosition:[-100, 400, 450],
  });
  PREVIEW.resize();
}

// Called after DOM + Monaco ready
function previewReady() {
  initPreview();
  runSim();

  // Resize observer
  var ro = new ResizeObserver(function() {
    if (PREVIEW) PREVIEW.resize();
  });
  ro.observe(document.getElementById('sim-wrap'));
}

// ═══════════════════════════════════════════════════════════
//  MONACO INIT
// ═══════════════════════════════════════════════════════════
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {

  monaco.languages.register({ id: 'gcode' });
  monaco.languages.setMonarchTokensProvider('gcode', {
    tokenizer: {
      root: [
        [/;.*$/,           'comment'],
        [/\([^)]*\)/,      'comment'],
        [/[GM]\d+(\.\d+)?/,'keyword'],
        [/[XYZEF]-?[\d.]+/,'number.float'],
        [/[IJKRS]-?[\d.]+/,'number'],
        [/[TQP]\d*/,       'type'],
        [/-?[\d.]+/,       'number'],
      ]
    }
  });
  monaco.editor.defineTheme('pe-dark', {
    base: 'vs-dark', inherit: true,
    rules: [
      { token: 'comment',      foreground: '484f58', fontStyle: 'italic' },
      { token: 'keyword',      foreground: 'f05500', fontStyle: 'bold'   },
      { token: 'number.float', foreground: '79c0ff' },
      { token: 'number',       foreground: '56d0ff' },
      { token: 'type',         foreground: '3fb950' },
    ],
    colors: {
      'editor.background':                  '#0d1117',
      'editor.foreground':                  '#e6edf3',
      'editorLineNumber.foreground':         '#484f58',
      'editorLineNumber.activeForeground':   '#8b949e',
      'editor.selectionBackground':          '#2d333b',
      'editorCursor.foreground':             '#f05500',
      'editor.lineHighlightBackground':      '#161b22',
      'editorGutter.background':             '#0d1117',
    }
  });

  window.ED = monaco.editor.create(document.getElementById('editor-wrap'), {
    language: 'gcode', theme: 'pe-dark', value: SAMPLE_GCODE,
    fontSize: 13, fontFamily: "'Cascadia Code','Fira Code','Consolas',monospace",
    lineNumbers: 'on', minimap: { enabled: true, scale: 1 },
    scrollBeyondLastLine: false, wordWrap: 'off',
    renderWhitespace: 'none', folding: false,
    quickSuggestions: false, parameterHints: { enabled: false },
    suggestOnTriggerCharacters: false, mouseWheelZoom: true,
  });

  ED.onDidChangeModelContent(function () {
    document.getElementById('s-lines').textContent =
      ED.getModel().getLineCount().toLocaleString('de');
  });
  ED.onDidChangeCursorPosition(function (e) {
    document.getElementById('s-cur').textContent =
      e.position.lineNumber + ':' + e.position.column;
  });

  previewReady();
});

// ═══════════════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════════════
function runSim() {
  if (!window.ED || !PREVIEW) return;
  var text = ED.getValue();

  // Quick stats from text (fast)
  var lines = ED.getModel().getLineCount();
  document.getElementById('s-lines').textContent = lines.toLocaleString('de');

  // Show loading for large files
  var loading = document.getElementById('sim-loading');
  if (lines > 5000) loading.classList.add('on');

  // Clear and re-process
  setTimeout(function () {
    try {
      PREVIEW.clear();
      PREVIEW.processGCode(text);

      MAXLAYER = PREVIEW.parser.layers.length;
      CURLAYER = MAXLAYER;

      // Update slider
      var sl = document.getElementById('layer-slider');
      sl.max   = MAXLAYER || 1;
      sl.value = MAXLAYER;

      updateLayerView();
      updateStats();
    } catch(e) {
      flash('Fehler: ' + e.message);
    }
    loading.classList.remove('on');
    flash('Simulation · ' + MAXLAYER + ' Layer');
  }, 0);
}

function setLayerTo(n) {
  if (!PREVIEW || !MAXLAYER) return;
  CURLAYER = Math.max(1, Math.min(MAXLAYER, n));
  document.getElementById('layer-slider').value = CURLAYER;
  updateLayerView();
}

function updateLayerView() {
  if (!PREVIEW || !MAXLAYER) return;

  PREVIEW.endLayer   = CURLAYER;
  PREVIEW.singleLayerMode = !CUMULATIVE;
  PREVIEW.render();

  // Layer display
  document.getElementById('layer-disp').textContent = CURLAYER + ' / ' + MAXLAYER;

  // Z height
  var layer = PREVIEW.layers[CURLAYER];
  var z = layer ? layer.height : '–';
  var zStr = layer ? PREVIEW.parser.layers.slice(0, CURLAYER)
    .reduce(function(a, l) { return a + (l.height || 0); }, 0).toFixed(3) + ' mm' : '–';
  document.getElementById('layer-z-val').textContent = zStr;
  document.getElementById('sim-overlay').textContent =
    'Layer ' + CURLAYER + ' / ' + MAXLAYER + '\nZ ≈ ' + zStr;
}

function updateStats() {
  if (!PREVIEW) return;
  var layers = PREVIEW.parser.layers;
  document.getElementById('s-layers').textContent = layers.length;

  // Estimate time + filament from parser data
  var totalE = 0, totalTime = 0;
  var prevX=0, prevY=0, prevZ=0, prevE=0, curF=2000;
  PREVIEW.parser.lines.forEach(function(line) {
    var l = line.trim().toUpperCase();
    if (!/^G0\b|^G00\b|^G1\b|^G01\b/.test(l)) return;
    var m;
    var nx = (m=l.match(/X(-?[\d.]+)/)) ? +m[1] : prevX;
    var ny = (m=l.match(/Y(-?[\d.]+)/)) ? +m[1] : prevY;
    var nz = (m=l.match(/Z(-?[\d.]+)/)) ? +m[1] : prevZ;
    var ne = (m=l.match(/E(-?[\d.]+)/)) ? +m[1] : prevE;
    if ((m=l.match(/F(-?[\d.]+)/))) curF = +m[1];
    var dist = Math.sqrt(Math.pow(nx-prevX,2)+Math.pow(ny-prevY,2)+Math.pow(nz-prevZ,2));
    if (curF > 0) totalTime += dist / curF * 60;
    if (ne > prevE) totalE += ne - prevE;
    prevX=nx; prevY=ny; prevZ=nz; prevE=ne;
  });
  var mm = Math.floor(totalTime/60), ss = Math.floor(totalTime%60);
  document.getElementById('s-time').textContent  = mm + 'm ' + String(ss).padStart(2,'0') + 's';
  document.getElementById('s-fil').textContent   = totalE.toFixed(1) + ' mm';
}

// ═══════════════════════════════════════════════════════════
//  LAYER CONTROLS
// ═══════════════════════════════════════════════════════════
function layerStep(d)  { setLayerTo(CURLAYER + d); }
function layerFirst()  { setLayerTo(1); }
function layerLast()   { setLayerTo(MAXLAYER); }
function sliderInput(v){ setLayerTo(parseInt(v)); }

function toggleCumul() {
  CUMULATIVE = !CUMULATIVE;
  document.getElementById('btn-cumul').classList.toggle('active', CUMULATIVE);
  document.getElementById('btn-cumul').textContent = CUMULATIVE ? 'CUM' : 'SGL';
  updateLayerView();
}

function toggleTravel() {
  if (!PREVIEW) return;
  SHOW_TRAVEL = !SHOW_TRAVEL;
  var btn = document.getElementById('btn-travel');
  btn.textContent = 'Travel: ' + (SHOW_TRAVEL ? 'ein' : 'aus');
  btn.classList.toggle('acc', SHOW_TRAVEL);
  PREVIEW.renderTravel = SHOW_TRAVEL;
  PREVIEW.render();
}

// ═══════════════════════════════════════════════════════════
//  FILE I/O
// ═══════════════════════════════════════════════════════════
function loadFile() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.gcode,.g,.nc,.ngc,.txt';
  inp.onchange = function (e) {
    var f = e.target.files[0]; if (!f) return;
    var r = new FileReader();
    r.onload = function (ev) { applyFile(ev.target.result, f.name); };
    r.readAsText(f);
  };
  inp.click();
}

function saveFile() {
  var text = ED.getValue();
  var blob = new Blob([text], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  var fn = document.getElementById('hdr-filename').textContent;
  a.download = (fn === 'Keine Datei' ? 'output' : fn.replace(/\.gcode$/i,'')) + '.gcode';
  a.click();
  flash('Gespeichert: ' + a.download);
}

function applyFile(text, name) {
  ED.setValue(text);
  document.getElementById('hdr-filename').textContent = name || 'output.gcode';
  runSim();
}

// ═══════════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════════
var ov = document.getElementById('drop-ov');
document.addEventListener('dragover',  function(e){ e.preventDefault(); ov.classList.add('on'); });
document.addEventListener('dragleave', function(e){ if(!e.relatedTarget) ov.classList.remove('on'); });
document.addEventListener('drop', function(e) {
  e.preventDefault(); ov.classList.remove('on');
  var f = e.dataTransfer.files[0]; if (!f) return;
  var r = new FileReader();
  r.onload = function(ev){ applyFile(ev.target.result, f.name); };
  r.readAsText(f);
});

// ═══════════════════════════════════════════════════════════
//  RESIZE HANDLE (Editor ↔ Sim)
// ═══════════════════════════════════════════════════════════
(function() {
  var rz = document.getElementById('rsz');
  var rp = document.getElementById('right-panel');
  var dr = false, sx, sw;
  rz.addEventListener('mousedown', function(e){
    dr=true; sx=e.clientX; sw=rp.offsetWidth;
    rz.classList.add('active');
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if (!dr) return;
    var nw = Math.max(260, Math.min(800, sw + (sx - e.clientX)));
    rp.style.width = nw + 'px';
    if (window.ED) ED.layout();
    if (PREVIEW)   PREVIEW.resize();
  });
  document.addEventListener('mouseup', function(){
    dr=false; rz.classList.remove('active');
  });
})();

window.addEventListener('resize', function(){
  if (window.ED)  ED.layout();
  if (PREVIEW)    PREVIEW.resize();
});

// ═══════════════════════════════════════════════════════════
//  OPTIMIZATIONS
// ═══════════════════════════════════════════════════════════
function getLines()        { return ED.getValue().split('\n'); }
function setLines(ll, msg) { ED.setValue(ll.join('\n')); flash(msg||'Fertig'); runSim(); }

function optComments() {
  setLines(getLines().map(function(l){ return l.split(';')[0].replace(/\([^)]*\)/g,'').trimEnd(); }), 'Kommentare entfernt');
}
function optEmptyLines() {
  setLines(getLines().filter(function(l){ return l.trim()!==''; }), 'Leerzeilen entfernt');
}
function optDuplicates() {
  var cx='__',cy='__',cz='__',cf='__';
  var before = getLines().length;
  var out = getLines().filter(function(line){
    var l=line.trim().toUpperCase(), m;
    if(!/^G0\b|^G00\b|^G1\b|^G01\b/.test(l)) return true;
    var nx=(m=l.match(/X(-?[\d.]+)/))?m[1]:cx;
    var ny=(m=l.match(/Y(-?[\d.]+)/))?m[1]:cy;
    var nz=(m=l.match(/Z(-?[\d.]+)/))?m[1]:cz;
    var nf=(m=l.match(/F(-?[\d.]+)/))?m[1]:cf;
    var ne=l.match(/E(-?[\d.]+)/);
    if(nx===cx&&ny===cy&&nz===cz&&nf===cf&&!ne) return false;
    cx=nx;cy=ny;cz=nz;cf=nf;
    return true;
  });
  setLines(out, 'Duplikate entfernt · ' + (before-out.length) + ' Zeilen');
}
function optFeed() {
  var f0=prompt('Vorschub G0 (mm/min):','9000');
  var f1=prompt('Vorschub G1 (mm/min):','1500');
  if(!f0||!f1) return;
  setLines(getLines().map(function(line){
    var l=line.trim().toUpperCase();
    if(/^G0\b|^G00\b/.test(l)) return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f0;
    if(/^G1\b|^G01\b/.test(l)&&!line.match(/E/i)) return line.replace(/F[\d.]+/i,'').trimEnd()+' F'+f1;
    return line;
  }), 'Vorschub normiert');
}

  flash('End-G-code eingefügt');
}
